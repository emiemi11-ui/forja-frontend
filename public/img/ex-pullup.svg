  <circle cx="200" cy="150" r="60" fill="none" stroke="#4ecdc4" stroke-width="0.5" opacity="0.1"><animate attributeName="r" values="60;100;60" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.15;0;0.15" dur="4s" repeatCount="indefinite"/></circle>
