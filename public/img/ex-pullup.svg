<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="#4ecdc408"/>
  <defs><filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#gf)" transform="translate(200,160)"><line x1="-40" y1="-60" x2="40" y2="-60" stroke="#4ecdc4" stroke-width="3"/><line x1="0" y1="-55" x2="0" y2="-20" stroke="#4ecdc4" stroke-width="4"><animate attributeName="y1" values="-55;-48;-55" dur="2s" repeatCount="indefinite"/></line><circle cx="0" cy="-15" r="12" fill="none" stroke="#4ecdc4" stroke-width="3"><animate attributeName="cy" values="-15;-8;-15" dur="2s" repeatCount="indefinite"/></circle><line x1="-8" y1="-20" x2="-20" y2="-52" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round"><animate attributeName="y2" values="-52;-45;-52" dur="2s" repeatCount="indefinite"/></line><line x1="8" y1="-20" x2="20" y2="-52" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round"><animate attributeName="y2" values="-52;-45;-52" dur="2s" repeatCount="indefinite"/></line><line x1="-5" y1="-5" x2="-15" y2="40" stroke="#4ecdc4" stroke-width="3"/><line x1="5" y1="-5" x2="15" y2="40" stroke="#4ecdc4" stroke-width="3"/></g>
