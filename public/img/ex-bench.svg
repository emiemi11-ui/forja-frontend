<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(197,241,53,0.05)"/>
  <defs><filter id="g6"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#g6)">
    <!-- Bench -->
    <rect x="120" y="175" width="160" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="140" y="183" width="8" height="30" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="252" y="183" width="8" height="30" rx="2" fill="rgba(255,255,255,0.08)"/>
    <!-- Body on bench -->
    <line x1="140" y1="168" x2="270" y2="168" stroke="#c5f135" stroke-width="4" stroke-linecap="round"/>
    <circle cx="275" cy="160" r="10" fill="none" stroke="#c5f135" stroke-width="3"/>
    <!-- Arms pushing bar -->
    <line x1="170" y1="168" x2="165" y2="130" stroke="#c5f135" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="130;145;130" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="230" y1="168" x2="235" y2="130" stroke="#c5f135" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="130;145;130" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Barbell -->
    <line x1="110" y1="128" x2="290" y2="128" stroke="#c5f135" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y1" values="128;143;128" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="128;143;128" dur="2s" repeatCount="indefinite"/>
    </line>
    <rect x="95" y="120" width="18" height="16" rx="3" fill="none" stroke="#c5f135" stroke-width="2">
      <animate attributeName="y" values="120;135;120" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="287" y="120" width="18" height="16" rx="3" fill="none" stroke="#c5f135" stroke-width="2">
      <animate attributeName="y" values="120;135;120" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">BENCH PRESS</text>
</svg>
