<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(78,205,196,0.06)"/>
  <defs><filter id="g4"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#g4)">
    <line x1="110" y1="155" x2="290" y2="155" stroke="#4ecdc4" stroke-width="4" stroke-linecap="round">
      <animate attributeName="y1" values="155;153;157;155" dur="4s" repeatCount="indefinite"/>
    </line>
    <circle cx="100" cy="145" r="12" fill="none" stroke="#4ecdc4" stroke-width="3">
      <animate attributeName="cy" values="145;143;147;145" dur="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="135" y1="155" x2="125" y2="195" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round"/>
    <line x1="265" y1="155" x2="275" y2="195" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round"/>
    <line x1="290" y1="155" x2="310" y2="195" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="200" x2="320" y2="200" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Timer -->
    <text x="200" y="130" text-anchor="middle" font-family="monospace" font-size="20" fill="#4ecdc4" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
      00:45
    </text>
  </g>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">PLANK</text>
</svg>
