<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <rect width="400" height="120" rx="12" fill="#0a0a0a"/>
  <polyline points="0,60 50,60 70,60 85,20 100,100 115,40 130,70 150,60 200,60 220,60 235,25 250,95 265,45 280,65 300,60 400,60" stroke="#c5f135" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dashoffset" from="800" to="0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dasharray" values="0 800;800 0" dur="3s" repeatCount="indefinite"/>
  </polyline>
  <circle r="4" fill="#c5f135">
    <animateMotion path="M0,60 L50,60 L70,60 L85,20 L100,100 L115,40 L130,70 L150,60 L200,60 L220,60 L235,25 L250,95 L265,45 L280,65 L300,60 L400,60" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
