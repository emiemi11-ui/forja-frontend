<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(255,77,28,0.06)"/>
  <defs><filter id="g3"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#g3)" transform="translate(200,140)">
    <line x1="0" y1="-40" x2="0" y2="15" stroke="#ff4d1c" stroke-width="4" stroke-linecap="round">
      <animate attributeName="y1" values="-40;-20;-40" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle cx="0" cy="-52" r="12" fill="none" stroke="#ff4d1c" stroke-width="3">
      <animate attributeName="cy" values="-52;-32;-52" dur="3s" repeatCount="indefinite"/>
    </circle>
    <polyline points="-12,-30 -25,10 -20,15" stroke="#ff4d1c" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="points" values="-12,-30 -25,10 -20,15;-10,-15 -20,20 -15,35;-12,-30 -25,10 -20,15" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="12,-30 25,10 20,15" stroke="#ff4d1c" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="points" values="12,-30 25,10 20,15;10,-15 20,20 15,35;12,-30 25,10 20,15" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="-8,15 -15,50 -12,75" stroke="#ff4d1c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polyline points="8,15 15,50 12,75" stroke="#ff4d1c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="-45" y1="15" x2="45" y2="15" stroke="#ff4d1c" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y1" values="15;35;15" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="15;35;15" dur="3s" repeatCount="indefinite"/>
    </line>
    <rect x="-55" y="10" width="12" height="12" rx="2" fill="none" stroke="#ff4d1c" stroke-width="2">
      <animate attributeName="y" values="10;30;10" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="43" y="10" width="12" height="12" rx="2" fill="none" stroke="#ff4d1c" stroke-width="2">
      <animate attributeName="y" values="10;30;10" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">DEADLIFT</text>
</svg>
