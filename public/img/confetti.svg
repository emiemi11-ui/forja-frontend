<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <style>
      @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(200px) rotate(720deg); opacity: 0; } }
      .confetti { animation: fall linear infinite; }
    </style>
  </defs>
  <rect x="40" y="10" width="8" height="8" rx="1" fill="#c5f135" class="confetti" style="animation-duration:2.1s;animation-delay:0s"/>
  <rect x="80" y="5" width="6" height="10" rx="1" fill="#1a56ff" class="confetti" style="animation-duration:1.8s;animation-delay:0.2s"/>
  <rect x="130" y="15" width="10" height="6" rx="1" fill="#ff4d1c" class="confetti" style="animation-duration:2.4s;animation-delay:0.4s"/>
  <rect x="170" y="8" width="7" height="7" rx="1" fill="#f5c518" class="confetti" style="animation-duration:1.9s;animation-delay:0.1s"/>
  <rect x="220" y="12" width="9" height="5" rx="1" fill="#c5f135" class="confetti" style="animation-duration:2.2s;animation-delay:0.6s"/>
  <rect x="260" y="5" width="6" height="9" rx="1" fill="#7B2FBE" class="confetti" style="animation-duration:2s;animation-delay:0.3s"/>
  <rect x="310" y="10" width="8" height="6" rx="1" fill="#1a56ff" class="confetti" style="animation-duration:2.3s;animation-delay:0.5s"/>
  <rect x="350" y="8" width="5" height="8" rx="1" fill="#ff4d1c" class="confetti" style="animation-duration:1.7s;animation-delay:0.7s"/>
  <circle cx="60" cy="12" r="4" fill="#4ecdc4" class="confetti" style="animation-duration:2.5s;animation-delay:0.15s"/>
  <circle cx="150" cy="8" r="3" fill="#ffbc7d" class="confetti" style="animation-duration:1.6s;animation-delay:0.35s"/>
  <circle cx="290" cy="15" r="4" fill="#c5f135" class="confetti" style="animation-duration:2.1s;animation-delay:0.55s"/>
  <circle cx="200" cy="5" r="3" fill="#ff4d1c" class="confetti" style="animation-duration:2.3s;animation-delay:0.8s"/>
</svg>