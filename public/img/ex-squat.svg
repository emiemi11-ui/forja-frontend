<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(26,86,255,0.08)"/>
  <defs><filter id="g2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#g2)" transform="translate(200,150)">
    <!-- Torso -->
    <line x1="0" y1="-30" x2="0" y2="20" stroke="#1a56ff" stroke-width="4" stroke-linecap="round">
      <animate attributeName="y1" values="-30;-15;-30" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <!-- Head -->
    <circle cx="0" cy="-42" r="12" fill="none" stroke="#1a56ff" stroke-width="3">
      <animate attributeName="cy" values="-42;-27;-42" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Left arm -->
    <polyline points="-15,-20 -35,-10 -30,5" stroke="#1a56ff" stroke-width="3" stroke-linecap="round" fill="none">
      <animate attributeName="points" values="-15,-20 -35,-10 -30,5;-12,-8 -30,0 -25,15;-15,-20 -35,-10 -30,5" dur="2.5s" repeatCount="indefinite"/>
    </polyline>
    <!-- Right arm -->
    <polyline points="15,-20 35,-10 30,5" stroke="#1a56ff" stroke-width="3" stroke-linecap="round" fill="none">
      <animate attributeName="points" values="15,-20 35,-10 30,5;12,-8 30,0 25,15;15,-20 35,-10 30,5" dur="2.5s" repeatCount="indefinite"/>
    </polyline>
    <!-- Left leg -->
    <polyline points="-8,20 -20,50 -15,75" stroke="#1a56ff" stroke-width="3" stroke-linecap="round" fill="none">
      <animate attributeName="points" values="-8,20 -20,50 -15,75;-8,20 -25,40 -30,60;-8,20 -20,50 -15,75" dur="2.5s" repeatCount="indefinite"/>
    </polyline>
    <!-- Right leg -->
    <polyline points="8,20 20,50 15,75" stroke="#1a56ff" stroke-width="3" stroke-linecap="round" fill="none">
      <animate attributeName="points" values="8,20 20,50 15,75;8,20 25,40 30,60;8,20 20,50 15,75" dur="2.5s" repeatCount="indefinite"/>
    </polyline>
    <!-- Barbell -->
    <line x1="-50" y1="-22" x2="50" y2="-22" stroke="#1a56ff" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="y1" values="-22;-10;-22" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-22;-10;-22" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <circle cx="-50" cy="-22" r="8" fill="none" stroke="#1a56ff" stroke-width="2">
      <animate attributeName="cy" values="-22;-10;-22" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="-22" r="8" fill="none" stroke="#1a56ff" stroke-width="2">
      <animate attributeName="cy" values="-22;-10;-22" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">SQUAT</text>
  <circle cx="200" cy="150" r="50" fill="none" stroke="#1a56ff" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="50;90;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
