<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(26,86,255,0.05)"/>
  <defs><filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#gf)">
    <!-- Incline bench (angled) -->
    <line x1="130" y1="200" x2="240" y2="155" stroke="rgba(255,255,255,0.12)" stroke-width="6" stroke-linecap="round"/>
    <line x1="150" y1="205" x2="150" y2="225" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
    <line x1="230" y1="165" x2="230" y2="225" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
    <!-- Body on incline -->
    <line x1="145" y1="192" x2="240" y2="148" stroke="#1a56ff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="248" cy="140" r="10" fill="none" stroke="#1a56ff" stroke-width="3"/>
    <!-- Arms pushing dumbbells -->
    <line x1="175" y1="180" x2="170" y2="135" stroke="#1a56ff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="135;150;135" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="210" y1="165" x2="205" y2="120" stroke="#1a56ff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="120;135;120" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Dumbbells -->
    <rect x="162" y="128" width="16" height="8" rx="2" fill="none" stroke="#1a56ff" stroke-width="2">
      <animate attributeName="y" values="128;143;128" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="197" y="113" width="16" height="8" rx="2" fill="none" stroke="#1a56ff" stroke-width="2">
      <animate attributeName="y" values="113;128;113" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">INCLINE PRESS</text>
</svg>