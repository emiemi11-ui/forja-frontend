<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(167,139,250,0.05)"/>
  <defs><filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#gf)" transform="translate(200,145)">
    <line x1="0" y1="-35" x2="0" y2="20" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-47" r="12" fill="none" stroke="#a78bfa" stroke-width="3"/>
    <!-- Cable from top -->
    <line x1="0" y1="-80" x2="0" y2="-20" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
    <!-- Arms pushing down -->
    <line x1="-6" y1="-20" x2="-10" y2="5" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="5" x2="-8" y2="25" stroke="#a78bfa" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="25;10;25" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="6" y1="-20" x2="10" y2="5" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="5" x2="8" y2="25" stroke="#a78bfa" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="25;10;25" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <!-- Handle bar -->
    <line x1="-15" y1="25" x2="15" y2="25" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="y1" values="25;10;25" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="25;10;25" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="-5" y1="20" x2="-10" y2="65" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="10" y2="65" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">TRICEP PUSHDOWN</text>
</svg>