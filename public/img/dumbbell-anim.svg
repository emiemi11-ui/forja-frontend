<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="90" fill="rgba(197,241,53,0.03)"/>
  <g transform="translate(100,100)">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite" additive="sum"/>
    <rect x="-60" y="-6" width="120" height="12" rx="6" fill="none" stroke="#c5f135" stroke-width="2.5"/>
    <rect x="-75" y="-15" width="20" height="30" rx="4" fill="none" stroke="#c5f135" stroke-width="2.5">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="-15" width="20" height="30" rx="4" fill="none" stroke="#c5f135" stroke-width="2.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
