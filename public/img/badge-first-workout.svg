<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c5f135" stop-opacity="0.2"/><stop offset="100%" stop-color="#c5f135" stop-opacity="0.05"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="140" rx="16" fill="#0f0f0e"/>
  <rect x="1" y="1" width="118" height="138" rx="15" fill="url(#bg)" stroke="#c5f135" stroke-width="1" stroke-opacity="0.3"/>
  <path d="M60,18 L90,30 L90,65 C90,85 75,100 60,108 C45,100 30,85 30,65 L30,30 Z" fill="none" stroke="#c5f135" stroke-width="1.5" filter="url(#gl)" opacity="0.6">
    <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </path>
  <text x="60" y="68" text-anchor="middle" font-size="28">💪</text>
  <text x="60" y="125" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#c5f135" letter-spacing="1.5" opacity="0.8">PRIMUL ANTRENAMENT</text>
  <circle cx="85" cy="25" r="2" fill="#c5f135" opacity="0.5">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>