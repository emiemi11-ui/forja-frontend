<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(167,139,250,0.06)"/>
  <defs><filter id="g5"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#g5)" transform="translate(200,130)">
    <circle cx="5" cy="-45" r="11" fill="none" stroke="#a78bfa" stroke-width="3">
      <animate attributeName="cy" values="-45;-48;-45;-42;-45" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-32" x2="0" y2="5" stroke="#a78bfa" stroke-width="4" stroke-linecap="round">
      <animate attributeName="y1" values="-32;-35;-32;-29;-32" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <polyline points="-5,-25 -25,-15 -35,-25" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="points" values="-5,-25 -25,-15 -35,-25;-5,-28 -15,-35 -5,-40;-5,-25 -25,-15 -35,-25;-5,-22 -30,-5 -40,-10;-5,-25 -25,-15 -35,-25" dur="0.8s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="5,-25 25,-15 35,-20" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="points" values="5,-25 25,-15 35,-20;5,-22 30,-5 40,-10;5,-25 25,-15 35,-20;5,-28 15,-35 5,-40;5,-25 25,-15 35,-20" dur="0.8s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="-5,5 -20,40 -30,60" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="points" values="-5,5 -20,40 -30,60;-5,5 -30,30 -40,55;-5,5 -20,40 -30,60;-5,5 -10,45 -5,65;-5,5 -20,40 -30,60" dur="0.8s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="5,5 20,40 30,60" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="points" values="5,5 20,40 30,60;5,5 10,45 5,65;5,5 20,40 30,60;5,5 30,30 40,55;5,5 20,40 30,60" dur="0.8s" repeatCount="indefinite"/>
    </polyline>
    <!-- Speed lines -->
    <line x1="-60" y1="-20" x2="-80" y2="-20" stroke="#a78bfa" stroke-width="1" opacity="0.3">
      <animate attributeName="opacity" values="0;0.5;0" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="-55" y1="0" x2="-85" y2="0" stroke="#a78bfa" stroke-width="1.5" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="-50" y1="20" x2="-75" y2="20" stroke="#a78bfa" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="0.6s" repeatCount="indefinite"/>
    </line>
  </g>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">RUNNING</text>
</svg>
