<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c5f135" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a56ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="120" fill="url(#glow1)" opacity="0.3"/>
  
  <!-- Pushup figure - animated -->
  <g filter="url(#neonGlow)">
    <!-- Body -->
    <line x1="120" y1="160" x2="280" y2="160" stroke="#c5f135" stroke-width="4" stroke-linecap="round">
      <animate attributeName="y1" values="160;155;160" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="160;165;160" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Arms -->
    <line x1="160" y1="160" x2="150" y2="200" stroke="#c5f135" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y1" values="160;155;160" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="240" y1="160" x2="250" y2="200" stroke="#c5f135" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y1" values="160;155;160" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Head -->
    <circle cx="110" cy="150" r="12" fill="none" stroke="#c5f135" stroke-width="3">
      <animate attributeName="cy" values="150;145;150" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Legs -->
    <line x1="280" y1="160" x2="310" y2="200" stroke="#c5f135" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y1" values="160;165;160" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Ground -->
    <line x1="130" y1="205" x2="270" y2="205" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">PUSH-UP</text>
  
  <!-- Pulse rings -->
  <circle cx="200" cy="160" r="40" fill="none" stroke="#c5f135" stroke-width="0.5" opacity="0.2">
    <animate attributeName="r" values="40;80;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
