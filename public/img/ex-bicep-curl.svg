<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(245,197,24,0.05)"/>
  <defs><filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#gf)" transform="translate(200,145)">
    <line x1="0" y1="-35" x2="0" y2="20" stroke="#f5c518" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-47" r="12" fill="none" stroke="#f5c518" stroke-width="3"/>
    <!-- Left arm curl -->
    <line x1="-8" y1="-25" x2="-15" y2="5" stroke="#f5c518" stroke-width="3" stroke-linecap="round"/>
    <line x1="-15" y1="5" x2="-18" y2="30" stroke="#f5c518" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x2" values="-18;-12;-18" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="30;-5;30" dur="2s" repeatCount="indefinite"/>
    </line>
    <circle cx="-18" cy="32" r="5" fill="none" stroke="#f5c518" stroke-width="2">
      <animate attributeName="cx" values="-18;-12;-18" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="32;-3;32" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Right arm curl -->
    <line x1="8" y1="-25" x2="15" y2="5" stroke="#f5c518" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="5" x2="18" y2="30" stroke="#f5c518" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x2" values="18;12;18" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="y2" values="30;-5;30" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <circle cx="18" cy="32" r="5" fill="none" stroke="#f5c518" stroke-width="2">
      <animate attributeName="cx" values="18;12;18" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="cy" values="32;-3;32" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <line x1="-5" y1="20" x2="-10" y2="65" stroke="#f5c518" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="10" y2="65" stroke="#f5c518" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">BICEP CURL</text>
</svg>