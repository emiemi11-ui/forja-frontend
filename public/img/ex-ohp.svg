<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="100" fill="rgba(255,77,28,0.05)"/>
  <defs><filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g filter="url(#gf)" transform="translate(200,160)">
    <line x1="0" y1="-35" x2="0" y2="20" stroke="#ff4d1c" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-47" r="12" fill="none" stroke="#ff4d1c" stroke-width="3">
      <animate attributeName="cy" values="-47;-52;-47" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Arms pushing up -->
    <line x1="-8" y1="-30" x2="-20" y2="-50" stroke="#ff4d1c" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="-50;-75;-50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-20;-18;-20" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="8" y1="-30" x2="20" y2="-50" stroke="#ff4d1c" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y2" values="-50;-75;-50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="20;18;20" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Barbell -->
    <line x1="-45" y1="-52" x2="45" y2="-52" stroke="#ff4d1c" stroke-width="3" stroke-linecap="round">
      <animate attributeName="y1" values="-52;-77;-52" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-52;-77;-52" dur="2s" repeatCount="indefinite"/>
    </line>
    <circle cx="-48" cy="-52" r="7" fill="none" stroke="#ff4d1c" stroke-width="2">
      <animate attributeName="cy" values="-52;-77;-52" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="-52" r="7" fill="none" stroke="#ff4d1c" stroke-width="2">
      <animate attributeName="cy" values="-52;-77;-52" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="-5" y1="20" x2="-10" y2="60" stroke="#ff4d1c" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="20" x2="10" y2="60" stroke="#ff4d1c" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.5)" letter-spacing="4">OVERHEAD PRESS</text>
</svg>